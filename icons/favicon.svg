<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#1d4ed8"/>
  <!-- Train body -->
  <rect x="6" y="11" width="20" height="12" rx="3" fill="white"/>
  <!-- Windows -->
  <rect x="8" y="13" width="6" height="5" rx="1" fill="#1d4ed8"/>
  <rect x="16" y="13" width="6" height="5" rx="1" fill="#1d4ed8"/>
  <!-- Wheels -->
  <circle cx="10" cy="24" r="3" fill="white"/>
  <circle cx="10" cy="24" r="1.5" fill="#1d4ed8"/>
  <circle cx="22" cy="24" r="3" fill="white"/>
  <circle cx="22" cy="24" r="1.5" fill="#1d4ed8"/>
  <!-- Dollar sign -->
  <text x="16" y="10" font-family="-apple-system,sans-serif" font-size="7" font-weight="700" fill="white" text-anchor="middle">$</text>
</svg>
