<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- Dollar sign -->
  <text x="16" y="10" font-family="-apple-system,sans-serif" font-size="7" font-weight="800" fill="white" text-anchor="middle">$</text>
  <!-- Train body -->
  <rect x="4" y="11" width="24" height="13" rx="3" fill="white"/>
  <!-- Windows -->
  <rect x="6" y="13" width="7" height="5" rx="1" fill="#1d4ed8"/>
  <rect x="15" y="13" width="7" height="5" rx="1" fill="#1d4ed8"/>
  <!-- Wheels -->
  <circle cx="9" cy="25" r="3" fill="white"/>
  <circle cx="9" cy="25" r="1.5" fill="#1d4ed8"/>
  <circle cx="23" cy="25" r="3" fill="white"/>
  <circle cx="23" cy="25" r="1.5" fill="#1d4ed8"/>
  <!-- Rail -->
  <rect x="3" y="27" width="26" height="2" rx="1" fill="rgba(255,255,255,0.5)"/>
</svg>
