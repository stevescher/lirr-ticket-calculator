  <rect x="116" y="192" width="280" height="160" rx="26" fill="white"/>
  <!-- Windows -->
  <rect x="148" y="224" width="74" height="54" rx="10" fill="#1d4ed8"/>
  <rect x="244" y="224" width="74" height="54" rx="10" fill="#1d4ed8"/>
  <rect x="340" y="224" width="42" height="54" rx="10" fill="#1d4ed8"/>
