  <line x1="288" y1="296" x2="288" y2="352" stroke="#1d4ed8" stroke-width="8"/>
  <!-- Wheels -->
  <circle cx="186" cy="368" r="32" fill="white"/>
  <circle cx="186" cy="368" r="16" fill="#1d4ed8"/>
  <circle cx="326" cy="368" r="32" fill="white"/>
  <circle cx="326" cy="368" r="16" fill="#1d4ed8"/>
