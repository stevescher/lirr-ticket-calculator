<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="38" fill="#1d4ed8"/>
  <!-- Train body -->
  <rect x="44" y="72" width="104" height="60" rx="10" fill="white"/>
  <!-- Windows -->
  <rect x="56" y="84" width="28" height="20" rx="4" fill="#1d4ed8"/>
  <rect x="92" y="84" width="28" height="20" rx="4" fill="#1d4ed8"/>
  <rect x="128" y="84" width="16" height="20" rx="4" fill="#1d4ed8"/>
  <!-- Door line -->
  <line x1="108" y1="112" x2="108" y2="132" stroke="#1d4ed8" stroke-width="3"/>
  <!-- Wheels -->
  <circle cx="70" cy="138" r="12" fill="white"/>
  <circle cx="70" cy="138" r="6" fill="#1d4ed8"/>
  <circle cx="122" cy="138" r="12" fill="white"/>
  <circle cx="122" cy="138" r="6" fill="#1d4ed8"/>
  <!-- Rail -->
  <rect x="30" y="148" width="132" height="5" rx="2" fill="rgba(255,255,255,0.5)"/>
  <!-- Dollar sign -->
  <text x="96" y="62" font-family="-apple-system,sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle">$</text>
</svg>
