<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#1e3a8a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
  <line x1="680" y1="0" x2="680" y2="630" stroke="rgba(255,255,255,.06)" stroke-width="1"/>

  <!-- Train icon (left) -->
  <g transform="translate(80, 55)">
    <rect width="120" height="120" rx="24" fill="rgba(255,255,255,.12)"/>
    <!-- Train body -->
    <rect x="14" y="38" width="92" height="52" rx="9" fill="white"/>
    <!-- Windows -->
    <rect x="20" y="47" width="26" height="18" rx="3" fill="#1d4ed8"/>
    <rect x="52" y="47" width="26" height="18" rx="3" fill="#1d4ed8"/>
    <rect x="84" y="47" width="16" height="18" rx="3" fill="#1d4ed8"/>
    <!-- Wheels -->
    <circle cx="34" cy="96" r="11" fill="white"/>
    <circle cx="34" cy="96" r="5" fill="#1d4ed8"/>
    <circle cx="86" cy="96" r="11" fill="white"/>
    <circle cx="86" cy="96" r="5" fill="#1d4ed8"/>
    <!-- Rail -->
    <rect x="8" y="104" width="104" height="4" rx="2" fill="rgba(255,255,255,.4)"/>
    <!-- Dollar -->
    <text x="60" y="34" font-family="-apple-system,sans-serif" font-size="20" font-weight="800" fill="white" text-anchor="middle">$</text>
  </g>

  <!-- App name -->
  <text x="228" y="112" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="-1">LIRR Ticket Calculator</text>

  <!-- Tagline -->
  <text x="228" y="165" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="26" fill="rgba(255,255,255,.75)" letter-spacing="-.3">Compare monthly pass vs individual tickets</text>

  <!-- Feature pills -->
  <g transform="translate(228, 210)">
    <!-- Pill 1 -->
    <rect width="200" height="40" rx="20" fill="rgba(255,255,255,.15)"/>
    <text x="100" y="26" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" fill="white" text-anchor="middle">📅 Interactive Calendar</text>
    <!-- Pill 2 -->
    <rect x="216" width="196" height="40" rx="20" fill="rgba(255,255,255,.15)"/>
    <text x="314" y="26" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" fill="white" text-anchor="middle">🚫 Holiday Exclusion</text>
    <!-- Pill 3 -->
    <rect x="428" width="174" height="40" rx="20" fill="rgba(255,255,255,.15)"/>
    <text x="515" y="26" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" fill="white" text-anchor="middle">🔗 Shareable Links</text>
  </g>

  <!-- Mini calendar mockup (right side) -->
  <g transform="translate(720, 60)">
    <rect width="400" height="440" rx="20" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.2)" stroke-width="1"/>
    <!-- Calendar header -->
    <text x="200" y="45" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle">April 2026</text>
    <!-- Day headers -->
    <text x="44"  y="80" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,.5)" text-anchor="middle">MON</text>
    <text x="100" y="80" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,.5)" text-anchor="middle">TUE</text>
    <text x="156" y="80" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,.5)" text-anchor="middle">WED</text>
    <text x="212" y="80" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,.5)" text-anchor="middle">THU</text>
    <text x="268" y="80" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,.5)" text-anchor="middle">FRI</text>
    <text x="324" y="80" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,.3)" text-anchor="middle">SAT</text>
    <text x="380" y="80" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,.3)" text-anchor="middle">SUN</text>

    <!-- Row 1: blanks + 1,2,3,4,5,6 -->
    <text x="44"  y="125" font-family="sans-serif" font-size="18" fill="rgba(255,255,255,.25)" text-anchor="middle">·</text>
    <text x="100" y="125" font-family="sans-serif" font-size="18" fill="rgba(255,255,255,.6)" text-anchor="middle">1</text>
    <text x="156" y="125" font-family="sans-serif" font-size="18" fill="rgba(255,255,255,.6)" text-anchor="middle">2</text>
    <text x="212" y="125" font-family="sans-serif" font-size="18" fill="rgba(255,255,255,.6)" text-anchor="middle">3</text>
    <text x="268" y="125" font-family="sans-serif" font-size="18" fill="rgba(255,255,255,.4)" text-anchor="middle">4</text>
    <text x="324" y="125" font-family="sans-serif" font-size="18" fill="rgba(255,255,255,.25)" text-anchor="middle">5</text>
    <text x="380" y="125" font-family="sans-serif" font-size="18" fill="rgba(255,255,255,.25)" text-anchor="middle">6</text>

    <!-- Row 2: selected days highlighted -->
    <text x="44"  y="181" font-family="sans-serif" font-size="18" fill="rgba(255,255,255,.6)" text-anchor="middle">7</text>
    <!-- Selected Tue -->
    <rect x="72" y="156" width="56" height="40" rx="8" fill="rgba(255,255,255,.9)"/>
    <text x="100" y="181" font-family="sans-serif" font-size="18" font-weight="700" fill="#1d4ed8" text-anchor="middle">8</text>
    <!-- Selected Wed -->
    <rect x="128" y="156" width="56" height="40" rx="8" fill="rgba(255,255,255,.9)"/>
    <text x="156" y="181" font-family="sans-serif" font-size="18" font-weight="700" fill="#1d4ed8" text-anchor="middle">9</text>
    <!-- Selected Thu -->
    <rect x="184" y="156" width="56" height="40" rx="8" fill="rgba(255,255,255,.9)"/>
    <text x="212" y="181" font-family="sans-serif" font-size="18" font-weight="700" fill="#1d4ed8" text-anchor="middle">10</text>
    <text x="268" y="181" font-family="sans-serif" font-size="18" fill="rgba(255,255,255,.4)" text-anchor="middle">11</text>
    <text x="324" y="181" font-family="sans-serif" font-size="18" fill="rgba(255,255,255,.25)" text-anchor="middle">12</text>
    <text x="380" y="181" font-family="sans-serif" font-size="18" fill="rgba(255,255,255,.25)" text-anchor="middle">13</text>

    <!-- Row 3 -->
    <text x="44"  y="237" font-family="sans-serif" font-size="18" fill="rgba(255,255,255,.6)" text-anchor="middle">14</text>
    <rect x="72" y="212" width="56" height="40" rx="8" fill="rgba(255,255,255,.9)"/>
    <text x="100" y="237" font-family="sans-serif" font-size="18" font-weight="700" fill="#1d4ed8" text-anchor="middle">15</text>
    <rect x="128" y="212" width="56" height="40" rx="8" fill="rgba(255,255,255,.9)"/>
    <text x="156" y="237" font-family="sans-serif" font-size="18" font-weight="700" fill="#1d4ed8" text-anchor="middle">16</text>
    <rect x="184" y="212" width="56" height="40" rx="8" fill="rgba(255,255,255,.9)"/>
    <text x="212" y="237" font-family="sans-serif" font-size="18" font-weight="700" fill="#1d4ed8" text-anchor="middle">17</text>
    <text x="268" y="237" font-family="sans-serif" font-size="18" fill="rgba(255,255,255,.4)" text-anchor="middle">18</text>
    <text x="324" y="237" font-family="sans-serif" font-size="18" fill="rgba(255,255,255,.25)" text-anchor="middle">19</text>
    <text x="380" y="237" font-family="sans-serif" font-size="18" fill="rgba(255,255,255,.25)" text-anchor="middle">20</text>

    <!-- Divider -->
    <line x1="20" y1="300" x2="380" y2="300" stroke="rgba(255,255,255,.15)" stroke-width="1"/>

    <!-- Cost comparison preview -->
    <text x="20" y="330" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,.5)" letter-spacing=".05em">COST COMPARISON</text>

    <!-- Best option highlight -->
    <rect x="20" y="345" width="360" height="52" rx="10" fill="rgba(22,163,74,.25)" stroke="rgba(134,239,172,.4)" stroke-width="1"/>
    <text x="36" y="372" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="600" fill="#4ade80">Individual One-Ways</text>
    <text x="364" y="372" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" font-weight="800" fill="#4ade80" text-anchor="end">$238.50</text>
    <rect x="290" y="344" width="72" height="16" rx="0 0 6 6" fill="#16a34a"/>
    <text x="326" y="356" font-family="sans-serif" font-size="10" font-weight="800" fill="white" text-anchor="middle" letter-spacing=".06em">BEST</text>

    <!-- Other options -->
    <text x="36" y="420" font-family="sans-serif" font-size="14" fill="rgba(255,255,255,.5)">#2  Monthly Pass</text>
    <text x="364" y="420" font-family="sans-serif" font-size="14" fill="rgba(255,255,255,.5)" text-anchor="end">$299.75</text>
  </g>

  <!-- URL / branding bar at bottom -->
  <rect x="0" y="550" width="1200" height="80" fill="rgba(0,0,0,.2)"/>
  <text x="80" y="598" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="20" fill="rgba(255,255,255,.6)">lirr-ticket-calculator.vercel.app</text>
  <text x="1120" y="598" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" fill="rgba(255,255,255,.4)" text-anchor="end">Free · No account required · Works offline</text>
</svg>
